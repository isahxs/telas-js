<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo</title>
    <link rel="stylesheet" href="./css-calculo/styles.css" />
</head>
<body>
    <div class="container">
        <h1>Cálculo de Lucro</h1>
        
 
            <div class="calculo">
                <label>Preço de venda (R$):</label>
                <input type = "number" id="precoVenda" value="12.00" step="0.01" min="0" >
            </div>
           
 
            <div class="calculo">
                <label>Custo unitário (R$):</label>
                <input type = "number" id="custoUnitario" value="5.50" step="0.01" min="0" >
            </div>
 
            <div class="calculo">
                <label>Quantidade (uni.):</label>
                <input type = "number" id="quantidade" value="30" min="1">
            </div>
           
            <button onclick="calcular()">Verificar</button>
   
        <div class="resultado" id="resultado"></div>
 
    </div>
 
   
<script src="./js-calculo/script.js"></script>
 
</body>
</html>
